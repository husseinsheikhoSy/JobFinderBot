<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>JobFinder – Remote & Global Jobs</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://w.tads.me/widget.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0d0f14;
            --surface: #161b24;
            --surface2: #1e2635;
            --border: rgba(255,255,255,0.07);
            --primary: #3b7eff;
            --primary-glow: rgba(59,126,255,0.25);
            --accent: #00e5a0;
            --accent-glow: rgba(0,229,160,0.2);
            --warn: #f59e0b;
            --text: #e8eaf0;
            --muted: #6b7899;
            --tag-bg: rgba(59,126,255,0.12);
            --tag-text: #7ab3ff;
            --success: #00e5a0;
            --danger: #ff5c7a;
            --card-shadow: 0 2px 20px rgba(0,0,0,0.4);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header ── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13,15,20,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 14px 16px 10px;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(90deg, #fff 60%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .job-count-badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 12px;
            color: var(--muted);
        }

        .job-count-badge span {
            color: var(--accent);
            font-weight: 700;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 2px;
            scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }

        .filter-btn {
            flex-shrink: 0;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* ── Search Bar ── */
        .search-wrap {
            padding: 12px 16px 0;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 14px;
        }

        .search-box svg { color: var(--muted); flex-shrink: 0; }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
        }

        .search-box input::placeholder { color: var(--muted); }

        /* ── Job Cards ── */
        .jobs-grid {
            padding: 12px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .job-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
            cursor: pointer;
            transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
        }

        .job-card:nth-child(1) { animation-delay: 0.04s; }
        .job-card:nth-child(2) { animation-delay: 0.08s; }
        .job-card:nth-child(3) { animation-delay: 0.12s; }
        .job-card:nth-child(4) { animation-delay: 0.16s; }
        .job-card:nth-child(5) { animation-delay: 0.20s; }

        @keyframes fadeIn {
            from { opacity:0; transform: translateY(10px); }
            to { opacity:1; transform: translateY(0); }
        }

        .job-card:hover, .job-card:active {
            border-color: rgba(59,126,255,0.4);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .company-logo {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .company-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .card-meta { flex: 1; min-width: 0; }

        .job-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .company-name {
            font-size: 13px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .source-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .source-dot.arbeitnow { background: #ff6b6b; }
        .source-dot.remotive { background: var(--accent); }
        .source-dot.empllo { background: var(--warn); }

        .new-badge {
            background: linear-gradient(135deg, var(--accent), #00c4f0);
            color: #000;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .tag {
            background: var(--tag-bg);
            color: var(--tag-text);
            font-size: 11px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 20px;
            border: 1px solid rgba(59,126,255,0.2);
        }

        .tag.location { background: rgba(0,229,160,0.1); color: var(--accent); border-color: rgba(0,229,160,0.2); }
        .tag.type { background: rgba(245,158,11,0.1); color: var(--warn); border-color: rgba(245,158,11,0.2); }
        .tag.salary { background: rgba(255,255,255,0.06); color: var(--muted); border-color: var(--border); }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .posted-date {
            font-size: 12px;
            color: var(--muted);
        }

        .apply-preview-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 7px 16px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }

        .apply-preview-btn:hover { opacity: 0.85; }

        /* ── Source Filter Tabs ── */
        .source-tabs {
            display: flex;
            gap: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px;
            margin: 0 16px 0;
        }

        .source-tab {
            flex: 1;
            text-align: center;
            padding: 6px 4px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: transparent;
            font-family: 'DM Sans', sans-serif;
        }

        .source-tab.active {
            background: var(--surface2);
            color: var(--text);
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
            padding: 20px 20px 32px;
            border: 1px solid var(--border);
            border-bottom: none;
        }

        .modal-overlay.open .modal {
            transform: translateY(0);
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .modal-header {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .modal-logo {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .modal-logo img { width:100%; height:100%; object-fit:contain; }

        .modal-title-block { flex: 1; }

        .modal-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .modal-company {
            font-size: 14px;
            color: var(--muted);
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }

        .modal-section {
            margin-bottom: 16px;
        }

        .modal-section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .modal-desc {
            font-size: 14px;
            line-height: 1.7;
            color: #b0b8cc;
        }

        .modal-desc p { margin-bottom: 8px; }
        .modal-desc ul { padding-left: 18px; }
        .modal-desc li { margin-bottom: 4px; }

        /* Ad section inside modal */
        .modal-ad-wrapper {
            margin: 16px 0;
            padding: 14px 0;
            border-top: 1px dashed var(--border);
            border-bottom: 1px dashed var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .ad-label {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #tads-container-9641 {
            width: 100%;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #tads-container-9641:empty { display: none; }

        /* Apply button */
        .apply-btn-wrap {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .watch-ad-btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
            background: var(--surface2);
            color: var(--muted);
        }

        .watch-ad-btn.ready {
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: white;
            box-shadow: 0 8px 24px rgba(59,126,255,0.4);
            animation: pulse-btn 2s infinite;
        }

        @keyframes pulse-btn {
            0%, 100% { box-shadow: 0 8px 24px rgba(59,126,255,0.4); }
            50% { box-shadow: 0 8px 32px rgba(59,126,255,0.7); }
        }

        .watch-ad-btn.loading {
            background: var(--surface2);
            color: var(--muted);
            cursor: not-allowed;
        }

        /* Email reveal */
        .email-reveal {
            display: none;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            margin-top: 10px;
            gap: 10px;
            align-items: center;
        }

        .email-reveal.visible {
            display: flex;
        }

        .email-text {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            word-break: break-all;
        }

        .copy-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .copy-btn:hover { background: var(--primary); border-color: var(--primary); color: white; }
        .copy-btn.copied { background: var(--accent); border-color: var(--accent); color: #000; }

        /* Progress steps */
        .ad-steps {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 12px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: background 0.3s;
        }

        .step-dot.active { background: var(--primary); }
        .step-dot.done { background: var(--accent); }

        /* Loading state */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { color: var(--muted); font-size: 14px; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 12px;
            padding: 10px 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .stats-bar::-webkit-scrollbar { display: none; }

        .stat-pill {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
        }

        .stat-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .refresh-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: 'DM Sans', sans-serif;
            transition: color 0.2s;
        }

        .refresh-btn:hover { color: var(--primary); }
        .refresh-btn.spinning svg { animation: spin 1s linear infinite; }

        /* Banner ad top of page */
        #tads-container-9640 {
            width: 100%;
            min-height: 60px;
        }

        #tads-container-9640:empty { display:none; }

        .banner-ad-wrap {
            padding: 8px 16px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>

<header>
    <div class="header-row">
        <div class="logo">
            <div class="logo-icon">💼</div>
            <span class="logo-text">JobFinder</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <div class="job-count-badge"><span id="total-count">0</span> Jobs</div>
            <button class="refresh-btn" id="refresh-btn" onclick="refreshJobs()">
                <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            </button>
        </div>
    </div>
    <!-- Source tabs -->
    <div class="source-tabs">
        <button class="source-tab active" onclick="filterSource('all')">All Sources</button>
        <button class="source-tab" onclick="filterSource('arbeitnow')">Arbeitnow</button>
        <button class="source-tab" onclick="filterSource('remotive')">Remotive</button>
        <button class="source-tab" onclick="filterSource('empllo')">Empllo</button>
    </div>
</header>

<!-- Banner Ad -->
<div class="banner-ad-wrap">
    <span class="ad-label">Sponsored</span>
    <div id="tads-container-9640"></div>
</div>

<!-- Search -->
<div class="search-wrap">
    <div class="search-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="search-input" placeholder="Search jobs, companies..." oninput="filterJobs()">
    </div>
</div>

<!-- Stats pills -->
<div class="stats-bar" id="stats-bar"></div>

<!-- Jobs grid -->
<div class="jobs-grid" id="jobs-container">
    <div class="loading-screen">
        <div class="spinner"></div>
        <p class="loading-text">Fetching latest jobs...</p>
    </div>
</div>

<!-- ── Job Detail Modal ── -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
        <div class="modal-handle"></div>

        <div class="modal-header">
            <div class="modal-logo" id="modal-logo"><span id="modal-logo-emoji">💼</span></div>
            <div class="modal-title-block">
                <div class="modal-title" id="modal-title">Job Title</div>
                <div class="modal-company" id="modal-company">Company · Source</div>
            </div>
        </div>

        <div class="modal-tags" id="modal-tags"></div>

        <!-- TGB Ad -->
        <div class="modal-ad-wrapper">
            <span class="ad-label">Sponsored</span>
            <div id="tads-container-9641"></div>
        </div>

        <div class="modal-section" id="modal-desc-section">
            <div class="modal-section-title">Job Description</div>
            <div class="modal-desc" id="modal-desc"></div>
        </div>

        <!-- Apply flow -->
        <div class="apply-btn-wrap">
            <div class="ad-steps" id="ad-steps">
                <div class="step-dot" id="step1"></div>
                <div class="step-dot" id="step2"></div>
            </div>

            <button class="watch-ad-btn ready" id="apply-btn" onclick="startApply()">
                🚀 Apply Now
            </button>

            <!-- Email reveal (shown if apply link is email) -->
            <div class="email-reveal" id="email-reveal">
                <div class="email-text" id="email-text"></div>
                <button class="copy-btn" id="copy-btn" onclick="copyEmail()">Copy</button>
            </div>
        </div>
    </div>
</div>

<script>
// ── Config ──────────────────────────────────────────
const FULLSCREEN_WIDGET_ID = "9640";
const TGB_WIDGET_ID = "9641";
const ADSLY_API_KEY = "c18f6dd2af7f32e7e7d9b36e2e3f3f39"; // placeholder – replace with real key

const tg = window.Telegram?.WebApp || null;
if (tg) { tg.ready(); tg.expand(); }

// ── State ────────────────────────────────────────────
let allJobs = [];
let filteredJobs = [];
let currentSource = 'all';
let currentJob = null;
let adStep = 0;
let isAdPlaying = false;
let fullscreenAdCtrl = null;
let tgbAdCtrl = null;

// ── Emoji mapping for job categories ────────────────
function getJobEmoji(tags = [], title = '') {
    const t = (tags.join(' ') + ' ' + title).toLowerCase();
    if (t.includes('design') || t.includes('ui') || t.includes('ux')) return '🎨';
    if (t.includes('data') || t.includes('analyst') || t.includes('analytics')) return '📊';
    if (t.includes('devops') || t.includes('cloud') || t.includes('aws') || t.includes('infrastructure')) return '☁️';
    if (t.includes('mobile') || t.includes('ios') || t.includes('android')) return '📱';
    if (t.includes('backend') || t.includes('python') || t.includes('java') || t.includes('node')) return '⚙️';
    if (t.includes('frontend') || t.includes('react') || t.includes('vue') || t.includes('javascript')) return '💻';
    if (t.includes('marketing') || t.includes('growth') || t.includes('seo')) return '📣';
    if (t.includes('sales') || t.includes('business') || t.includes('account')) return '🤝';
    if (t.includes('hr') || t.includes('recruit') || t.includes('people')) return '👥';
    if (t.includes('finance') || t.includes('accounting') || t.includes('financial')) return '💰';
    if (t.includes('product') || t.includes('pm')) return '🚀';
    if (t.includes('content') || t.includes('writer') || t.includes('copy')) return '✍️';
    if (t.includes('customer') || t.includes('support') || t.includes('success')) return '💬';
    if (t.includes('security') || t.includes('cyber')) return '🔒';
    return '💼';
}

function timeAgo(dateStr) {
    if (!dateStr) return 'Recently';
    const date = new Date(dateStr);
    if (isNaN(date)) return 'Recently';
    const diff = (Date.now() - date) / 1000;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
}

function isNew(dateStr) {
    if (!dateStr) return false;
    return (Date.now() - new Date(dateStr)) < 86400000 * 2;
}

function isEmail(str) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(str);
}

// ── Fetch Jobs ────────────────────────────────────────
async function fetchArbeitnow() {
    try {
        const res = await fetch('https://arbeitnow.com/api/job-board-api?page=1');
        const data = await res.json();
        const jobs = (data.data || []).slice(0, 50);
        return jobs.map(j => ({
            id: `arb_${j.slug}`,
            title: j.title || '',
            company: j.company_name || '',
            location: j.location || 'Remote',
            type: j.job_types?.[0] || '',
            tags: j.tags || [],
            description: j.description || '',
            url: j.url || '',
            salary: j.salary || '',
            remote: j.remote,
            posted: j.created_at ? new Date(j.created_at * 1000).toISOString() : null,
            source: 'arbeitnow',
            logo: j.company_logo || null
        }));
    } catch(e) { console.error('Arbeitnow:', e); return []; }
}

async function fetchRemotive() {
    try {
        const res = await fetch('https://remotive.com/api/remote-jobs?limit=50');
        const data = await res.json();
        const jobs = (data.jobs || []).slice(0, 50);
        return jobs.map(j => ({
            id: `rem_${j.id}`,
            title: j.title || '',
            company: j.company_name || '',
            location: j.candidate_required_location || 'Worldwide',
            type: j.job_type || '',
            tags: j.tags || [],
            description: j.description || '',
            url: j.url || '',
            salary: j.salary || '',
            remote: true,
            posted: j.publication_date || null,
            source: 'remotive',
            logo: j.company_logo_url || null,
            category: j.category || ''
        }));
    } catch(e) { console.error('Remotive:', e); return []; }
}

async function fetchEmpllo() {
    try {
        const res = await fetch('https://empllo.com/api/v1');
        const data = await res.json();
        const jobs = (Array.isArray(data) ? data : data.jobs || []).slice(0, 50);
        return jobs.map(j => ({
            id: `emp_${j.id || Math.random()}`,
            title: j.title || j.position || '',
            company: j.company || j.company_name || '',
            location: j.location || j.country || 'Remote',
            type: j.type || j.job_type || '',
            tags: j.skills || j.tags || [],
            description: j.description || '',
            url: j.apply_url || j.url || j.link || '',
            salary: j.salary || j.compensation || '',
            remote: true,
            posted: j.created_at || j.date_posted || null,
            source: 'empllo',
            logo: j.company_logo || j.logo || null
        }));
    } catch(e) { console.error('Empllo:', e); return []; }
}

async function loadAllJobs() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');

    const [arb, rem, emp] = await Promise.all([fetchArbeitnow(), fetchRemotive(), fetchEmpllo()]);

    // Merge & deduplicate
    allJobs = [...arb, ...rem, ...emp];
    // Sort by posted date descending
    allJobs.sort((a, b) => {
        const da = a.posted ? new Date(a.posted) : new Date(0);
        const db = b.posted ? new Date(b.posted) : new Date(0);
        return db - da;
    });

    btn.classList.remove('spinning');
    updateStats();
    applyFilters();
}

function refreshJobs() { loadAllJobs(); }

// ── Filter & Render ──────────────────────────────────
function filterSource(src) {
    currentSource = src;
    document.querySelectorAll('.source-tab').forEach((el, i) => {
        const tabs = ['all','arbeitnow','remotive','empllo'];
        el.classList.toggle('active', tabs[i] === src);
    });
    applyFilters();
}

function filterJobs() { applyFilters(); }

function applyFilters() {
    const q = document.getElementById('search-input').value.toLowerCase();
    filteredJobs = allJobs.filter(j => {
        if (currentSource !== 'all' && j.source !== currentSource) return false;
        if (q) {
            const haystack = `${j.title} ${j.company} ${j.location} ${j.tags.join(' ')}`.toLowerCase();
            if (!haystack.includes(q)) return false;
        }
        return true;
    });
    renderJobs();
}

function updateStats() {
    const arb = allJobs.filter(j => j.source === 'arbeitnow').length;
    const rem = allJobs.filter(j => j.source === 'remotive').length;
    const emp = allJobs.filter(j => j.source === 'empllo').length;
    document.getElementById('total-count').textContent = allJobs.length;
    const bar = document.getElementById('stats-bar');
    bar.innerHTML = `
        <div class="stat-pill"><span class="stat-dot" style="background:#ff6b6b"></span>Arbeitnow: ${arb}</div>
        <div class="stat-pill"><span class="stat-dot" style="background:var(--accent)"></span>Remotive: ${rem}</div>
        <div class="stat-pill"><span class="stat-dot" style="background:var(--warn)"></span>Empllo: ${emp}</div>
        <div class="stat-pill">🕐 Updated just now</div>
    `;
}

function stripHtml(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || '';
}

function renderJobs() {
    const container = document.getElementById('jobs-container');
    document.getElementById('total-count').textContent = filteredJobs.length;

    if (filteredJobs.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>No jobs found.<br>Try a different search or source.</p></div>`;
        return;
    }

    container.innerHTML = filteredJobs.map((job, i) => {
        const emoji = getJobEmoji(job.tags, job.title);
        const logoHtml = job.logo
            ? `<img src="${job.logo}" alt="" onerror="this.parentElement.innerHTML='${emoji}'">`
            : emoji;
        const tagsHtml = [
            job.location ? `<span class="tag location">📍 ${job.location}</span>` : '',
            job.type ? `<span class="tag type">${job.type}</span>` : '',
            job.remote ? `<span class="tag type">🌍 Remote</span>` : '',
            job.salary ? `<span class="tag salary">💵 ${job.salary}</span>` : '',
            ...(job.tags || []).slice(0,3).map(t => `<span class="tag">${t}</span>`)
        ].filter(Boolean).slice(0,5).join('');

        return `
        <div class="job-card" onclick="openJob(${i})" style="animation-delay:${Math.min(i*0.05,0.5)}s">
            <div class="card-top">
                <div class="company-logo">${logoHtml}</div>
                <div class="card-meta">
                    <div class="job-title">${job.title}</div>
                    <div class="company-name">
                        <span class="source-dot ${job.source}"></span>
                        ${job.company || 'Unknown'} · ${job.source}
                    </div>
                </div>
                ${isNew(job.posted) ? '<span class="new-badge">New</span>' : ''}
            </div>
            <div class="tags-row">${tagsHtml}</div>
            <div class="card-footer">
                <span class="posted-date">⏱ ${timeAgo(job.posted)}</span>
                <button class="apply-preview-btn">Apply →</button>
            </div>
        </div>`;
    }).join('');
}

// ── Modal ────────────────────────────────────────────
function openJob(index) {
    currentJob = filteredJobs[index];
    adStep = 0;
    isAdPlaying = false;

    const j = currentJob;
    const emoji = getJobEmoji(j.tags, j.title);

    // Logo
    const logoEl = document.getElementById('modal-logo');
    if (j.logo) {
        logoEl.innerHTML = `<img src="${j.logo}" alt="" onerror="this.parentElement.innerHTML='${emoji}'">`;
    } else {
        logoEl.innerHTML = emoji;
    }

    document.getElementById('modal-title').textContent = j.title;
    document.getElementById('modal-company').textContent = `${j.company || 'Unknown'} · ${j.source}`;

    // Tags
    const tags = [
        j.location ? `<span class="tag location">📍 ${j.location}</span>` : '',
        j.type ? `<span class="tag type">${j.type}</span>` : '',
        j.remote ? `<span class="tag type">🌍 Remote</span>` : '',
        j.salary ? `<span class="tag salary">💵 ${j.salary}</span>` : '',
        j.category ? `<span class="tag">${j.category}</span>` : '',
        ...(j.tags || []).map(t => `<span class="tag">${t}</span>`)
    ].filter(Boolean).join('');
    document.getElementById('modal-tags').innerHTML = tags;

    // Description
    let desc = j.description || 'No description available.';
    // Try to render as HTML safely, otherwise plain text
    const descEl = document.getElementById('modal-desc');
    descEl.innerHTML = desc.length > 5000 ? desc.substring(0,5000)+'...' : desc;

    // Reset apply state
    resetApplyState();

    // Show modal
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';

    // Load TGB ad
    loadTGBAd();
}

function closeModal(e) {
    if (e.target === document.getElementById('modal-overlay')) {
        document.getElementById('modal-overlay').classList.remove('open');
        document.body.style.overflow = '';
    }
}

function resetApplyState() {
    adStep = 0;
    document.getElementById('step1').className = 'step-dot';
    document.getElementById('step2').className = 'step-dot';
    document.getElementById('apply-btn').className = 'watch-ad-btn ready';
    document.getElementById('apply-btn').innerHTML = '🚀 Apply Now';
    document.getElementById('apply-btn').disabled = false;
    document.getElementById('email-reveal').classList.remove('visible');
}

// ── Ad System ────────────────────────────────────────
window.addEventListener('load', () => {
    initFullscreenAd();
    initBannerAd();
});

function initBannerAd() {
    waitForTads(() => {
        const ctrl = window.tads.init({
            widgetId: FULLSCREEN_WIDGET_ID,
            type: 'static',
            debug: false,
            onAdsNotFound: () => {
                document.querySelector('.banner-ad-wrap').style.display = 'none';
            }
        });
        if (ctrl?.loadAd) ctrl.loadAd().then(() => ctrl.showAd()).catch(() => {});
    });
}

function initFullscreenAd() {
    waitForTads(() => {
        fullscreenAdCtrl = window.tads.init({
            widgetId: FULLSCREEN_WIDGET_ID,
            type: 'fullscreen',
            debug: false,
            onShowReward: () => handleAdReward(),
            onAdsNotFound: () => handleAdFallback(),
            onError: (err) => { console.error(err); handleAdFallback(); }
        });
    });
}

function loadTGBAd() {
    waitForTads(() => {
        tgbAdCtrl = window.tads.init({
            widgetId: TGB_WIDGET_ID,
            type: 'static',
            debug: false,
            onAdsNotFound: () => {
                document.querySelector('.modal-ad-wrapper').style.display = 'none';
            }
        });
        if (tgbAdCtrl?.loadAd) {
            tgbAdCtrl.loadAd().then(() => tgbAdCtrl.showAd()).catch(() => {
                document.querySelector('.modal-ad-wrapper').style.display = 'none';
            });
        }
    });
}

function waitForTads(cb) {
    if (window.tads?.init) { cb(); return; }
    const iv = setInterval(() => {
        if (window.tads?.init) { clearInterval(iv); cb(); }
    }, 100);
}

// ── Apply Flow ───────────────────────────────────────
function startApply() {
    if (isAdPlaying) return;

    if (adStep === 0) {
        // Step 1: watch ad
        isAdPlaying = true;
        const btn = document.getElementById('apply-btn');
        btn.className = 'watch-ad-btn loading';
        btn.innerHTML = '⏳ Loading ad...';
        btn.disabled = true;
        document.getElementById('step1').className = 'step-dot active';

        if (fullscreenAdCtrl) {
            fullscreenAdCtrl.showAd().catch(() => handleAdFallback());
        } else {
            handleAdFallback();
        }
    } else if (adStep === 1) {
        // Step 2: watch second ad then open link
        isAdPlaying = true;
        const btn = document.getElementById('apply-btn');
        btn.className = 'watch-ad-btn loading';
        btn.innerHTML = '⏳ Loading ad...';
        btn.disabled = true;
        document.getElementById('step2').className = 'step-dot active';

        if (fullscreenAdCtrl) {
            fullscreenAdCtrl.showAd().catch(() => handleAdFallback());
        } else {
            handleAdFallback();
        }
    }
}

function handleAdReward() {
    isAdPlaying = false;
    adStep++;

    if (adStep === 1) {
        document.getElementById('step1').className = 'step-dot done';
        const btn = document.getElementById('apply-btn');
        btn.className = 'watch-ad-btn ready';
        btn.innerHTML = '🎯 One more step → Apply';
        btn.disabled = false;
    } else if (adStep >= 2) {
        document.getElementById('step2').className = 'step-dot done';
        openApplyLink();
    }
}

function handleAdFallback() {
    console.warn('Ad fallback triggered');
    setTimeout(() => handleAdReward(), 800);
}

async function openApplyLink() {
    const j = currentJob;
    if (!j) return;

    const applyBtn = document.getElementById('apply-btn');
    applyBtn.innerHTML = '✅ Opening...';
    applyBtn.className = 'watch-ad-btn';
    applyBtn.disabled = true;

    const rawUrl = j.url;

    // Check if it's an email
    if (isEmail(rawUrl)) {
        document.getElementById('email-text').textContent = rawUrl;
        document.getElementById('email-reveal').classList.add('visible');
        applyBtn.innerHTML = '✉️ Email revealed below';
        return;
    }

    // Shorten via ADSly
    let finalUrl = rawUrl;
    try {
        const r = await fetch(`https://adsly.io/api/url?api=${ADSLY_API_KEY}&url=${encodeURIComponent(rawUrl)}&format=json`);
        const d = await r.json();
        if (d?.shortenedUrl || d?.short_url || d?.data?.shortenedUrl) {
            finalUrl = d.shortenedUrl || d.short_url || d.data?.shortenedUrl;
        }
    } catch(e) {
        console.warn('ADSly shortening failed, using original URL');
    }

    // Open link
    if (tg?.openLink) {
        tg.openLink(finalUrl);
    } else {
        window.open(finalUrl, '_blank');
    }
}

function copyEmail() {
    const email = document.getElementById('email-text').textContent;
    navigator.clipboard.writeText(email).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
}

// ── Boot ─────────────────────────────────────────────
loadAllJobs();
</script>
