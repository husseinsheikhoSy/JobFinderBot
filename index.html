<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Job Finder — وظائف عن بُعد</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1419;
            --bg-elevated: #1a222d;
            --card: #222d3a;
            --accent: #3eb489;
            --accent-dim: #2d8f6c;
            --sky: #5ab0ff;
            --text: #e8eef4;
            --muted: #9aafbf;
            --border: rgba(255, 255, 255, 0.08);
            --radius: 16px;
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }

        body {
            font-family: 'Source Sans 3', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
            min-height: 100vh;
            padding-bottom: 88px;
        }

        .header {
            background: linear-gradient(145deg, #152028 0%, var(--bg-elevated) 45%, #0d3d2e 100%);
            padding: 28px 20px 32px;
            margin-bottom: 8px;
            border-radius: 0 0 24px 24px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            inset: -40% -20% auto;
            height: 120%;
            background: radial-gradient(ellipse at 30% 0%, rgba(62, 180, 137, 0.35), transparent 55%);
            pointer-events: none;
        }

        .header-inner {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .header h1 {
            font-family: 'Fraunces', Georgia, serif;
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--muted);
            max-width: 36em;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px 18px 24px;
        }

        .filters {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }

        .filter-group {
            margin-bottom: 14px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.82rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--bg-elevated);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(62, 180, 137, 0.2);
        }

        .jobs-count {
            text-align: center;
            margin-bottom: 16px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .job-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 18px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s, border-color 0.2s;
        }

        .job-card:hover {
            transform: translateY(-2px);
            border-color: rgba(62, 180, 137, 0.35);
        }

        .job-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 14px;
            gap: 14px;
        }

        .job-logo {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            object-fit: cover;
            background: var(--bg-elevated);
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .job-logo.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent-dim), var(--sky));
        }

        .job-info {
            flex: 1;
            min-width: 0;
        }

        .job-title {
            font-family: 'Fraunces', Georgia, serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            line-height: 1.35;
        }

        .job-company {
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .job-source {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(90, 176, 255, 0.15);
            color: var(--sky);
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .job-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .job-detail {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.88rem;
            color: var(--muted);
        }

        .job-description {
            color: var(--text);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 14px;
            padding: 14px;
            background: var(--bg-elevated);
            border-radius: 12px;
            border-inline-start: 4px solid var(--accent);
        }

        .job-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .job-tag {
            padding: 5px 11px;
            background: rgba(62, 180, 137, 0.12);
            color: var(--accent);
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .apply-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            color: #041910;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, filter 0.15s;
        }

        .apply-btn:hover {
            filter: brightness(1.08);
            transform: scale(1.01);
        }

        .apply-btn:active {
            transform: scale(0.99);
        }

        .loading {
            text-align: center;
            padding: 48px 20px;
            color: var(--muted);
        }

        .spinner {
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 0.85s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-jobs {
            text-align: center;
            padding: 56px 20px;
            color: var(--muted);
        }

        .no-jobs-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.85;
        }

        .ad-notice {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(90deg, #3d2428, #2a1f2e);
            color: var(--text);
            padding: 14px 16px;
            text-align: center;
            font-size: 0.82rem;
            border-top: 1px solid var(--border);
            z-index: 1000;
        }

        .ad-notice strong {
            display: block;
            margin-bottom: 4px;
            color: #ffb4b4;
            font-size: 0.88rem;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.45rem;
            }
            .job-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <h1>💼 Job Finder</h1>
            <p>أحدث الفرص من Arbeitnow و Remotive و Empllo — تصفية وبحث داخل التطبيق المصغّر.</p>
        </div>
    </div>

    <div class="container">
        <div class="filters">
            <div class="filter-group">
                <label for="sourceFilter">المصدر</label>
                <select id="sourceFilter">
                    <option value="all">كل المصادر</option>
                    <option value="Arbeitnow">Arbeitnow</option>
                    <option value="Remotive">Remotive</option>
                    <option value="Empllo">Empllo</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="searchInput">بحث</label>
                <input type="text" id="searchInput" placeholder="عنوان، شركة، مهارة…">
            </div>
        </div>

        <div class="jobs-count" id="jobsCount"></div>

        <div id="jobsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>جاري تحميل الوظائف…</p>
            </div>
        </div>
    </div>

    <div class="ad-notice">
        <strong>تنبيه</strong>
        عند «Apply» قد تظهر إعلانات؛ أكمل حتى رابط التقديم. البوت يرسل نفس الفرص في المحادثة الخاصة.
    </div>

    <script>
        const ADSLY_API_KEY = 'wXQjh0fSfId9KuS2XW0rFopflitN2M76';
        const ADSLY_CREATE = 'https://adsly.me/api/link/create';

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let allJobs = [];
        let filteredJobs = [];

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function decodeBase64UrlParam(s) {
            if (!s) return '';
            let b64 = s.replace(/-/g, '+').replace(/_/g, '/');
            while (b64.length % 4) b64 += '=';
            try {
                return decodeURIComponent(
                    Array.prototype.map.call(atob(b64), c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')
                );
            } catch (e) {
                return atob(b64);
            }
        }

        function normalizeHttps(url) {
            if (!url || typeof url !== 'string') return url;
            let u = url.trim();
            if (u.startsWith('http://')) u = 'https://' + u.slice(7);
            else if (!u.startsWith('https://')) u = 'https://' + u.replace(/^\/+/, '');
            return u;
        }

        async function shortenUrl(url) {
            const target = normalizeHttps(url);
            if (!target || !target.startsWith('https://')) return url;

            try {
                const params = new URLSearchParams({ api_key: ADSLY_API_KEY, url: target });
                const res = await fetch(ADSLY_CREATE + '?' + params.toString(), { method: 'GET' });
                const data = await res.json().catch(() => ({}));
                if (res.ok && data.ok && data.link) return data.link;
                console.warn('adsly:', data);
            } catch (e) {
                console.error('shortenUrl', e);
            }
            return url;
        }

        async function fetchAllJobs() {
            const jobs = [];
            try {
                const arbeitnowResponse = await fetch('https://arbeitnow.com/api/job-board-api');
                const arbeitnowData = await arbeitnowResponse.json();
                const arbeitnowJobs = (arbeitnowData.data || []).slice(0, 50).map(job => ({
                    id: job.slug || String(Math.random()),
                    title: job.title || 'N/A',
                    company: job.company_name || 'N/A',
                    location: job.location || 'Remote',
                    description: job.description || '',
                    tags: job.tags || [],
                    url: job.url || '',
                    created_at: job.created_at || '',
                    source: 'Arbeitnow',
                    logo: null
                }));
                jobs.push(...arbeitnowJobs);

                const remotiveResponse = await fetch('https://remotive.com/api/remote-jobs?limit=50');
                const remotiveData = await remotiveResponse.json();
                const remotiveJobs = (remotiveData.jobs || []).slice(0, 50).map(job => ({
                    id: String(job.id || Math.random()),
                    title: job.title || 'N/A',
                    company: job.company_name || 'N/A',
                    location: job.candidate_required_location || 'Remote',
                    description: job.description || '',
                    tags: job.category ? [job.category] : [],
                    url: job.url || '',
                    created_at: job.publication_date || '',
                    source: 'Remotive',
                    logo: job.company_logo || null
                }));
                jobs.push(...remotiveJobs);

                const emplloResponse = await fetch('https://empllo.com/api/v1/jobs?limit=50');
                const emplloData = await emplloResponse.json();
                const emplloJobs = (emplloData.data || []).slice(0, 50).map(job => ({
                    id: String(job.id || Math.random()),
                    title: job.title || 'N/A',
                    company: (job.company && job.company.name) || 'N/A',
                    location: job.location || 'Remote',
                    description: job.description || '',
                    tags: job.skills || [],
                    url: job.apply_url || '',
                    created_at: job.published_at || '',
                    source: 'Empllo',
                    logo: (job.company && job.company.logo) || null
                }));
                jobs.push(...emplloJobs);
            } catch (error) {
                console.error('fetchAllJobs', error);
            }

            jobs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            return jobs;
        }

        function displayJobs(jobs) {
            const container = document.getElementById('jobsContainer');
            const countElement = document.getElementById('jobsCount');

            if (jobs.length === 0) {
                container.innerHTML = `
                    <div class="no-jobs">
                        <div class="no-jobs-icon">📭</div>
                        <h3>لا توجد نتائج</h3>
                        <p>جرّب مصدرًا آخر أو كلمات بحث مختلفة</p>
                    </div>`;
                countElement.textContent = '';
                return;
            }

            countElement.textContent = `عرض ${jobs.length} وظيفة`;

            container.innerHTML = jobs.map((job, idx) => {
                const description = (job.description || '').replace(/<[^>]+>/g, '').substring(0, 250);
                const tags = Array.isArray(job.tags) ? job.tags.filter(Boolean) : [];
                const date = job.created_at
                    ? new Date(job.created_at).toLocaleDateString('ar-SA', { year: 'numeric', month: 'short', day: 'numeric' })
                    : '—';

                const logoHtml = job.logo
                    ? `<img src="${escapeHtml(job.logo)}" alt="" class="job-logo" loading="lazy">`
                    : `<div class="job-logo placeholder" aria-hidden="true">💼</div>`;

                const tagsHtml = tags.length
                    ? `<div class="job-tags">${tags.map(t => `<span class="job-tag">${escapeHtml(String(t))}</span>`).join('')}</div>`
                    : '';

                return `
                    <article class="job-card" data-job-index="${idx}">
                        <div class="job-header">
                            ${logoHtml}
                            <div class="job-info">
                                <h2 class="job-title">${escapeHtml(job.title)}</h2>
                                <div class="job-company">${escapeHtml(job.company)}</div>
                                <span class="job-source">${escapeHtml(job.source)}</span>
                            </div>
                        </div>
                        <div class="job-details">
                            <div class="job-detail"><span>📍</span><span>${escapeHtml(job.location)}</span></div>
                            <div class="job-detail"><span>📅</span><span>${escapeHtml(date)}</span></div>
                        </div>
                        <div class="job-description">${escapeHtml(description)}…</div>
                        ${tagsHtml}
                        <button type="button" class="apply-btn" data-idx="${idx}">📝 تقدّم الآن</button>
                    </article>`;
            }).join('');

            container.querySelectorAll('.apply-btn').forEach(btn => {
                const i = parseInt(btn.getAttribute('data-idx'), 10);
                btn.addEventListener('click', () => applyToJob(jobs[i] && jobs[i].url));
            });
        }

        async function applyToJob(url) {
            if (!url) {
                tg.showAlert('لا يوجد رابط تقديم لهذه الوظيفة.');
                return;
            }
            tg.HapticFeedback?.impactOccurred?.('light');
            const shortened = await shortenUrl(url);
            tg.openLink(shortened, { try_instant_view: false });
        }

        function filterJobs() {
            const sourceFilter = document.getElementById('sourceFilter').value;
            const searchText = document.getElementById('searchInput').value.toLowerCase().trim();

            filteredJobs = allJobs.filter(job => {
                const matchesSource = sourceFilter === 'all' || job.source === sourceFilter;
                const matchesSearch = !searchText ||
                    (job.title && job.title.toLowerCase().includes(searchText)) ||
                    (job.company && job.company.toLowerCase().includes(searchText)) ||
                    (job.description && job.description.toLowerCase().includes(searchText)) ||
                    (Array.isArray(job.tags) && job.tags.some(tag => String(tag).toLowerCase().includes(searchText)));
                return matchesSource && matchesSearch;
            });
            displayJobs(filteredJobs);
        }

        document.getElementById('sourceFilter').addEventListener('change', filterJobs);
        document.getElementById('searchInput').addEventListener('input', filterJobs);

        window.addEventListener('DOMContentLoaded', async () => {
            allJobs = await fetchAllJobs();
            filteredJobs = allJobs;
            displayJobs(filteredJobs);
        });

        const urlParams = new URLSearchParams(window.location.search);
        const encodedJobUrl = urlParams.get('url');
        if (encodedJobUrl) {
            try {
                const decoded = decodeBase64UrlParam(encodedJobUrl);
                if (decoded) applyToJob(decoded);
            } catch (e) {
                console.error('decode url param', e);
            }
        }
    </script>
</body>
</html>
